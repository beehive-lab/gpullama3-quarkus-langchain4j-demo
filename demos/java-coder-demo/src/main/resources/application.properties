quarkus.package.main-class=demo.JavaCoderDemo

## GPULlama3 configuration
## Host-controlled workflow: model only generates/fixes code, no tool orchestration.
## Works reliably with 1B models. Any instruct model that can output Java source is sufficient.
quarkus.langchain4j.gpu-llama3.enable-integration=true
quarkus.langchain4j.gpu-llama3.chat-model.model-name=unsloth/Llama-3.2-1B-Instruct-GGUF
quarkus.langchain4j.gpu-llama3.chat-model.quantization=F16
#quarkus.langchain4j.gpu-llama3.chat-model.model-name=ggml-org/Qwen3-0.6B-GGUF
#quarkus.langchain4j.gpu-llama3.chat-model.quantization=f16
## Llama 3B (more coherent code generation):
#quarkus.langchain4j.gpu-llama3.chat-model.model-name=unsloth/Llama-3.2-3B-Instruct-GGUF
#quarkus.langchain4j.gpu-llama3.chat-model.quantization=Q8_0

quarkus.langchain4j.gpu-llama3.chat-model.temperature=0.2
quarkus.langchain4j.gpu-llama3.chat-model.top-p=0.95
#for qwen
#quarkus.langchain4j.gpu-llama3.chat-model.temperature=0.6
#quarkus.langchain4j.gpu-llama3.chat-model.top-p=0.95
## Code generation needs more tokens; increase if programs are truncated
quarkus.langchain4j.gpu-llama3.chat-model.max-tokens=2048

quarkus.langchain4j.gpu-llama3.log-requests=true
quarkus.langchain4j.gpu-llama3.log-responses=true
